#
# This file requires tox >= 4.21 with the tox-uv plugin:
#   pip install "tox>=4.21" tox-uv
#   OR: uvx --with tox-uv tox -e unit
#
# For older tox installations, the equivalent configuration lives in
# pyproject.toml under [tool.tox.legacy_tox_ini].

skipsdist = true
skip_missing_interpreters = true
envlist = ["lint", "unit", "static", "coverage-report"]
requires = ["tox>=4", "tox-uv"]
no_package = true

[env_run_base]
runner = "uv-venv-lock-runner"
passenv = ["PYTHONPATH"]

[env_run_base.setenv]
PYTHONPATH = "{toxinidir}/src"
PY_COLORS = "1"

[env.fmt]
description = "Apply coding style standards to code"
commands = [
  ["ruff", "check", "--fix", "--select", "I", {replace = "ref", of = ["vars", "all_path"], extend = true}],
  ["ruff", "format", {replace = "ref", of = ["vars", "all_path"], extend = true}],
]
dependency_groups = ["fmt"]

[env.lint]
description = "Check code against coding style standards"
commands = [
  ["codespell", "{toxinidir}"],
  ["ruff", "format", "--check", "--diff", {replace = "ref", of = ["vars", "all_path"], extend = true}],
  ["ruff", "check", {replace = "ref", of = ["vars", "all_path"], extend = true}],
  ["mypy", {replace = "ref", of = ["vars", "all_path"], extend = true}],
]
dependency_groups = ["lint"]

[env.lint-fix]
description = "Apply coding style standards to code"
commands = [
  ["ruff", "check", "--fix", "--fix-only", {replace = "ref", of = ["vars", "all_path"], extend = true}],
]
dependency_groups = ["lint"]

[env.unit]
description = "Run unit tests"
commands = [
  [
    "coverage", "run",
    "--source={[vars]src_path}",
    "-m", "pytest",
    "--ignore={[vars]tst_path}integration",
    "-v", "--tb", "native", "-s",
    {replace = "posargs", extend = "true"},
  ],
  ["coverage", "report"],
]
dependency_groups = ["unit"]

[env.coverage-report]
description = "Create test coverage report"
commands = [["coverage", "report"]]
dependency_groups = ["coverage-report"]

[env.static]
description = "Run static analysis checks"
commands = [["bandit", "-c", "{toxinidir}/pyproject.toml", "-r", "{[vars]src_path}", "{[vars]tst_path}", "-ll"]]
dependency_groups = ["static"]

[vars]
src_path = "{toxinidir}/src/"
tst_path = "{toxinidir}/tests/"
all_path = ["{toxinidir}/src/", "{toxinidir}/tests/"]
